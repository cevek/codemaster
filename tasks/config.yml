version: 1
id:
  prefix: t
  length: 6
  alphabet: digits # base32 (default) | alpha (a-z) | hex (0-9a-f) | digits (0-9)
statuses:
  - name: backlog
    actionable: true
  - name: todo
    actionable: true
  - name: in-progress
  - name: review
  - name: done
    terminal: true
  - name: rejected
    terminal: true
priorities: [ low, medium, high, urgent ]
defaults:
  status: backlog
  priority: low
maxDepth: 2
archive:
  mode: manual
# Fields mirror the backlog's own taxonomy: `type · imp · cx` + the subsystem section.
fields:
  # work class — the first tag token in the old `- [ ]` items
  type: { type: enum, values: [ bug, feat, perf, dx, infra, doc, imp ] }
  # cx — S (hours) · M (a PR) · L (a fat task / design needed); declared ascending
  complexity: { type: enum, values: [ S, M, L ] }
  # subsystem — the section the item lived under in docs/backlog.md
  area:
    type: enum
    values:
      - platform
      - multi-program
      - ts-core
      - ts-refactor
      - transaction
      - impact-usages
      - framework
      - render
      - trace
      - scss
      - i18n
      - schema
      - docs
      - correctness
  source:
    type: enum
    values:
      - dogfood-jul
    required: false
web:
  host: 127.0.0.1
  port: 57345
